<svg xmlns="http://www.w3.org/2000/svg" viewBox="11 13 42 42">
  <!-- Background overlay -->
  <rect x="12" y="14" width="40" height="36" rx="2" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.4"/>
  <!-- Modal window -->
  <rect x="19" y="21" width="26" height="22" rx="2" fill="none" stroke="#67e8f9" stroke-width="2"/>
  <!-- Row 1: highlighted/selected item -->
  <rect x="21" y="24.5" width="22" height="5" rx="1" fill="none" stroke="#67e8f9" stroke-width="1" opacity="0.6"/>
  <line x1="24" y1="27" x2="38" y2="27" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <!-- Row 2: normal item -->
  <line x1="24" y1="33" x2="36" y2="33" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Row 3: faded item -->
  <line x1="24" y1="39" x2="33" y2="39" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
