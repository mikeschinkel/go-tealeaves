<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 12 40 40">
  <!-- 3x2 grid of color swatches representing the ANSI 256 palette -->
  <rect x="14" y="14" width="9" height="9" rx="1" fill="none" stroke="#67e8f9" stroke-width="2"/>
  <rect x="27" y="14" width="9" height="9" rx="1" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.75"/>
  <rect x="40" y="14" width="9" height="9" rx="1" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.5"/>
  <rect x="14" y="26" width="9" height="9" rx="1" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.6"/>
  <rect x="27" y="26" width="9" height="9" rx="1" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.45"/>
  <rect x="40" y="26" width="9" height="9" rx="1" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.3"/>
  <!-- Named constant label lines -->
  <line x1="14" y1="41" x2="41" y2="41" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="47" x2="32" y2="47" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
