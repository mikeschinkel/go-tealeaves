<svg xmlns="http://www.w3.org/2000/svg" viewBox="11 13 42 42">
  <!-- Background overlay -->
  <rect x="12" y="14" width="40" height="36" rx="2" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.4"/>
  <!-- Modal window -->
  <rect x="19" y="21" width="26" height="22" rx="2" fill="none" stroke="#67e8f9" stroke-width="2"/>
  <!-- Row 1: selected radio + label -->
  <circle cx="25" cy="27" r="2.5" fill="none" stroke="#67e8f9" stroke-width="1.5"/>
  <circle cx="25" cy="27" r="1" fill="#67e8f9"/>
  <line x1="30" y1="27" x2="40" y2="27" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <!-- Row 2: unselected radio + label -->
  <circle cx="25" cy="33" r="2.5" fill="none" stroke="#67e8f9" stroke-width="1.5"/>
  <line x1="30" y1="33" x2="38" y2="33" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Row 3: unselected radio + label (faded) -->
  <circle cx="25" cy="39" r="2.5" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.5"/>
  <line x1="30" y1="39" x2="35" y2="39" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
