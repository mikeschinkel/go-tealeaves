<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 14 40 38">
  <!-- Main terminal area -->
  <rect x="13" y="15" width="38" height="36" rx="2" fill="none" stroke="#67e8f9" stroke-width="2"/>
  <!-- Content lines (TUI output area) -->
  <line x1="18" y1="22" x2="44" y2="22" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="18" y1="28" x2="40" y2="28" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="18" y1="34" x2="36" y2="34" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Help visor band at bottom -->
  <rect x="13" y="40" width="38" height="11" rx="2" fill="none" stroke="#67e8f9" stroke-width="2"/>
  <!-- Key binding pairs inside visor: [q] Quit  [↑↓] Nav -->
  <rect x="17" y="43" width="6" height="5" rx="1" fill="none" stroke="#67e8f9" stroke-width="1.5"/>
  <line x1="24" y1="45.5" x2="28" y2="45.5" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="32" y="43" width="6" height="5" rx="1" fill="none" stroke="#67e8f9" stroke-width="1.5"/>
  <line x1="39" y1="45.5" x2="43" y2="45.5" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
</svg>
