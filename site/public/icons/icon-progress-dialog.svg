<svg xmlns="http://www.w3.org/2000/svg" viewBox="11 13 42 42">
  <!-- Background overlay -->
  <rect x="12" y="14" width="40" height="36" rx="2" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.4"/>
  <!-- Modal window -->
  <rect x="19" y="21" width="26" height="22" rx="2" fill="none" stroke="#67e8f9" stroke-width="2"/>
  <!-- Progress label -->
  <line x1="24" y1="28" x2="36" y2="28" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Progress bar track -->
  <rect x="23" y="33" width="18" height="3" rx="1.5" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.4"/>
  <!-- Progress bar fill (60%) -->
  <rect x="23" y="33" width="11" height="3" rx="1.5" fill="#67e8f9" opacity="0.6"/>
  <!-- Percentage text hint -->
  <line x1="27" y1="39" x2="33" y2="39" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
