<svg xmlns="http://www.w3.org/2000/svg" viewBox="15 15 35 34">
  <!-- Vertical trunk -->
  <line x1="22" y1="16" x2="22" y2="38" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <!-- Branch 1 -->
  <line x1="22" y1="22" x2="30" y2="22" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="22" r="2.5" fill="none" stroke="#67e8f9" stroke-width="2"/>
  <!-- Branch 2: expanded with sub-branches -->
  <line x1="22" y1="32" x2="30" y2="32" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="2.5" fill="#67e8f9" opacity="0.6"/>
  <!-- Drill-down arrow -->
  <polyline points="36,30 40,32 36,34" fill="none" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sub-tree lines (indented) -->
  <line x1="42" y1="28" x2="42" y2="38" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="42" y1="30" x2="48" y2="30" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="42" y1="36" x2="46" y2="36" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Branch 3: faded -->
  <line x1="22" y1="38" x2="28" y2="38" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
