  <!-- Center connector lines -->
  <line x1="30" y1="25" x2="33" y2="25" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="30" y1="32" x2="33" y2="32" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="30" y1="39" x2="33" y2="39" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
