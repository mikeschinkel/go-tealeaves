  <line x1="16" y1="23" x2="26" y2="23" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="30" x2="26" y2="30" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="16" y1="37" x2="26" y2="37" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="44" x2="22" y2="44" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <!-- Right text lines -->
  <line x1="37" y1="23" x2="47" y2="23" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="30" x2="47" y2="30" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
