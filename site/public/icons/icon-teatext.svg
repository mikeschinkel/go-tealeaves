<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 14 40 38">
  <!-- Text editor / input area -->
  <rect x="13" y="15" width="38" height="36" rx="2" fill="none" stroke="#67e8f9" stroke-width="2"/>
  <!-- Text lines with varying lengths (snippet/content) -->
  <line x1="18" y1="23" x2="44" y2="23" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="30" x2="41" y2="30" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="37" x2="34" y2="37" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <!-- Blinking cursor at end of last line -->
  <line x1="36" y1="34" x2="36" y2="40" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
  <!-- Gutter line on left side -->
  <line x1="15" y1="19" x2="15" y2="45" stroke="#67e8f9" stroke-width="1" opacity="0.35"/>
</svg>
