- agent: "auditor"
  time: "2026-04-04T04:08:28"
  content: "Here are my honest post-mortem observations:\n\n---\n\n## Auditor Post-Mortem: docs-update-tealeaves\n\n### What Worked Well\n- The task brief was specific and numbered — easy to map findings to questions\n- The scope was well-bounded (tea* dirs + site/src/content/docs/components/)\n- Asking about `doc-go-repo` availability was useful as a prerequisite check\n- The section checklist (frontmatter, Install, bash block, code example, API Reference, Related Components) gave clear pass/fail criteria\n\n---\n\n### Issues and Recommendations\n\n**1. \"tea.Model interface\" definition was ambiguous**\n\nThe brief defined it as `Init() tea.Cmd, Update(tea.Msg) (tea.Model, tea.Cmd), View() tea.View` but in v2 Bubble Tea, `View()` returns `string`, not `tea.View`. I had to verify this against actual source. The brief should specify the exact v2 signatures, or just say \"any type that satisfies `tea.Model` as defined in `github.com/charmbracelet/bubbletea/v2`.\"\n\n**2. No guidance on packages that partially qualify**\n\n`teapane` has `View()` methods but no `Init()`/`Update()` — it's not a full model but shows up as borderline. The brief had no rule for this. I made a judgment call. A clear rule (\"must implement all three methods\") would remove ambiguity.\n\n**3. The h2pp audit script was referenced but doesn't exist**\n\nMy auditor instructions say to run `h2pp audit` first, but that script isn't in this repo. The fallback path works, but the mismatch between instructions and reality adds noise on every run. Either add the script or update my instructions to not reference it.\n\n**4. \"Check if descriptions are accurate\" is unverifiable without running code**\n\nQuestion 5 asked whether each ComponentCard had an \"accurate description.\" I can only compare descriptions against source type names and doc page text — I can't verify behavioral accuracy. The criterion should be narrowed to something auditable: \"does the type name in `type=` match the exported struct name in the package?\"\n\n**5. No criteria for what counts as a \"code example\"**\n\nMy section checklist looked for ```` ```go ```` blocks. But some pages have install snippets that happen to use Go syntax. The brief should specify: \"at least one `go` fenced block that demonstrates constructing or using the component (not just a type declaration).\"\n\n**6. Icon duplicate check criteria was vague**\n\n\"Flag any that appear to be identical copies\" — I compared file sizes. Two icons had the same byte count but I couldn't confirm visual identity without rendering SVG. Either define the check as \"same SHA256\" (which I can do) or \"visually identical\" (which needs a human). I flagged the two same-size files as a precaution, which may be noise.\n\n**7. Question 9 split across two locations without explaining why**\n\nRoot `examples/` and `site/examples/` were asked about separately with no explanation of their different purposes. Knowing the intent (root = runnable Go examples, site = documentation gallery?) would help me flag the right problems. The site/examples/ being empty is either a bug or intentional — I couldn't tell.\n\n**8. No guidance on what to do with \"planned\" components**\n\n`teaterm` has no Go source — just a research file. It appears in the sidebar, has a doc page, and has an icon. Is this a documentation problem or expected? The brief should say whether stub components should be flagged or ignored.\n\n---\n\n### Suggested Recipe Additions for Next Run\n\n- Add a step: **verify ComponentCard `type=` matches actual exported struct name** (mechanical, reliable)\n- Add a step: **check for orphaned examples** — symlinks in root `examples/` that point to non-existent directories\n- Add a step: **check doc page word count** — pages under ~300 words are likely stubs regardless of section headings\n- Clarify: distinguish `teapane`-style widget packages (View only) from full model packages"
- agent: "writer"
  time: "2026-04-04T04:08:36"
  content: "Good questions. Here are concrete recommendations based on where this sprint caused friction:\n\n---\n\n**1. C3: \"Appropriate category\" was ambiguous**\n\nThe instruction said \"keep one category each, the appropriate one\" but didn't define appropriate. For pages that are both visible UI components AND system utilities (status bar, notifications, help visor), the right grid isn't obvious. The brief should say explicitly: *\"If the page has a visual component a developer puts in their layout, keep the ComponentCard and remove from sys-grid. If it's pure infrastructure/utility, keep the SystemCard and remove from comp-grid.\"*\n\n**2. C4: One package, three cards — not addressed**\n\nKey Registry, Theming, and Positioning all come from `teautils`. Using the exact same description for all three would be terrible UX. The criterion should say: *\"For packages that serve multiple component pages, adapt the first sentence to reflect each card's specific sub-domain rather than duplicating the full package sentence verbatim.\"*\n\n**3. C4: \"Qualifying component\" was undefined**\n\nThe brief said \"for each qualifying component\" without specifying what qualifies. I assumed all ComponentCards. Clarify whether deprecated cards (Diff Renderer, Terminal Renderer) and planned-but-unimplemented packages are included.\n\n**4. C10: Stale evaluation state**\n\nThe evaluator flagged teagrid as missing ~22 symbols, but they were already added in a previous sprint. The C10 instructions told me to re-do work that was complete. The recipe should instruct the evaluator to re-run checks against the current HEAD before issuing P1 findings, or the writer's task brief should say \"verify current state before adding — these symbols may already be present.\"\n\n**5. C8: 25 individual edits due to hook blocking sed/perl**\n\nThe Module line update was a pure regex replacement across 25 files — trivially done with `sed -i` in one command. The hook blocked perl/sed, forcing 25 separate Edit operations. The recipe should either note this constraint and suggest a workaround (a small Python script via Bash, or a dedicated task), or the hook should whitelist non-destructive in-place text substitutions.\n\n**6. Sprint scope was too large for one context window**\n\nThis sprint hit context limits partway through (resulting in the compacted summary). The recipe should split into two passes: Pass 1 = structural fixes (C3, C4, C8), Pass 2 = API completeness sweep (C10). Smaller, focused tasks complete faster and don't lose context.\n\n**7. teaterm/teapane: Unimplemented packages not addressed in C4**\n\n`teaterm` has no Go files — just a research doc. `teapane` had no `doc.go`. The C4 criterion said \"write a doc.go if missing\" but didn't address packages with *no Go code at all*. Add a rule: *\"For planned/stub packages with no .go files, preserve the existing description; do not create a doc.go.\"*\n\n**8. Evaluator should check doc-go-repo output directly, not just spot-check one package**\n\nThe evaluator spot-checked teagrid but didn't run the full sweep itself. If the evaluator ran `doc-go-repo` for all 12 packages during evaluation, it could produce a definitive \"missing symbols\" list rather than having the writer discover it post-hoc. This would eliminate the stale-state problem in recommendation #4."
