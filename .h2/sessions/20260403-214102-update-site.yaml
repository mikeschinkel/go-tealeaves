  content: "Good timing to capture this. Here are my concrete recommendations:\n\n---\n\n## Post-Mortem: Documentation Sprint\n\n### 1. Pre-verify symbol lists before the brief\n\nTwo symbols in the brief didn't exist in source (`PositionAbove`/`PositionBelow`) and one had the wrong package (`EnsureTermGetSize` attributed to `teautils`, lives in `teafields`/`teamodal`). The audit that generated the brief was either stale or ran against the wrong package. Recommend: run `go doc -all ./pkg/` as part of audit generation, not just as a step for the writer.\n\n### 2. The P1 evaluator found symbols not in the brief\n\n`ChoiceKeyMap`, `BorderConfig`, `Direction`, `TreeKeyMap`, `DefaultDrillDownKeyMap` were all real, exported, undocumented symbols that weren't in the original task list. Either the audit pass that produced the brief was incomplete, or the brief should explicitly say *\"these are minimums, use `go doc -all` to check for anything else in the same area.\"* A writer shouldn't rely solely on the list being exhaustive.\n\n### 3. Specify the `go doc` invocation syntax\n\nThe brief says `go doc -all <package>` but the GitHub module path form doesn't work without full GOPATH setup. The correct form for this repo is `go doc -all ./teamodal/` (relative path from repo root). One line in the format requirements would save the lookup.\n\n### 4. Clarify \"already documented — just add the heading\"\n\nSeveral items said things like *\"coverage was already good, just missing the heading\"* (color-constants, layout-engine). In practice the heading wasn't the only thing missing — new symbols also needed to be added after inspection. The distinction between \"only add the heading\" and \"add the heading and then audit for gaps\" should be explicit.\n\n### 5. Split large multi-page briefs into smaller focused passes\n\nThis sprint was 17+ pages in one shot, which required delegating to a sub-agent and accepting reduced visibility into individual decisions. Two passes — one for the heading-only pages and one for the content-rich pages — would be easier to review and course-correct mid-sprint.\n\n### 6. Specify what \"promote to a proper API entry\" means concretely\n\nThe drilldown task said *\"promote DrillDownKeyMap from inline mention to a proper documented API entry.\"* That's interpretable several ways. A concrete model — *\"add a subsection heading, a fields table, and a DefaultX() function row\"* — removes ambiguity.\n\n---\n\nShort version: the brief was well-structured and the symbol lists were detailed enough to work from. The main gaps were **stale/wrong package attribution** in the audit, **incomplete symbol coverage** caught only by the evaluator, and **ambiguous instructions** on a few items. Adding a quick `go doc -all` verification pass to the audit step that generates the brief would fix most of these."
