- agent: "icon-designer"
  time: "2026-04-04T04:08:17"
  content: "From my experience on this sprint, here are recommendations for improving the icon designer recipe:\n\n**What worked well**\n- The task instruction was clear and actionable: read both files, compare, redesign if needed, report back.\n- The specific criteria (identical vs. distinct, what each icon should represent) removed ambiguity.\n\n**What could be improved**\n\n1. **Style guide discovery is implicit.** The recipe says \"look at existing icons to establish the style guide before creating new ones,\" but there's no canonical list of where icons live. I had to infer `site/public/icons/`. A brief in the task or recipe should specify the icon directory explicitly.\n\n2. **No design spec for icon semantics.** When I'm asked to create icons from scratch, I know the component name but not what concept it should convey visually. For components like `tealayout` or `teapane`, the visual metaphor isn't obvious. The recipe could ask the task sender to include a one-line visual concept per icon (e.g., \"teapane = split window panels\").\n\n3. **No size/format constraints stated.** The recipe doesn't specify viewBox convention, expected pixel size, or whether icons need to work at e.g. 16×16 or 32×32. Inferring from existing icons works, but it's fragile if the existing set is inconsistent.\n\n4. **Byte-count similarity as a proxy for \"identical\" is unreliable.** The auditor flagged these as potentially identical based on file size. The recipe or auditor brief could note that byte-count matching is a weak signal — actual content diff is the right check.\n\n5. **No commit/PR guidance.** If I had made changes, the recipe doesn't say whether to commit directly to main, open a PR, or message back for review. For an icon-only change this is probably fine to commit directly, but it should be explicit.\n\n**Summary of suggested additions to the recipe brief:**\n- Explicit icon directory path\n- Visual concept hint per icon when requesting creation\n- viewBox/size conventions (or pointer to a reference icon to match)\n- Note that file-size comparison is not a reliable identity check\n- Commit/PR policy for icon changes"
